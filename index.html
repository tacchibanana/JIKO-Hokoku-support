<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報告アプリ_Tacchibanana</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --card: #ffffff; --alert: #e74c3c; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; line-height: 1.3; }
        .app-container { max-width: 850px; margin: auto; }
        
        .card { background: var(--card); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; border: 1px solid #d1d5db; position: relative; }
        h1 { text-align: center; font-size: 1.3rem; margin: 0 0 10px 0; color: var(--primary); letter-spacing: 0.3em; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        
        .type-selector { background: #eef2f7; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid var(--accent); }
        .type-selector label { color: var(--accent); font-size: 0.8rem; }
        .type-selector select { border: 2px solid var(--accent); font-weight: bold; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .full-width { grid-column: 1 / -1; }
        
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 2px; font-size: 0.75rem; color: var(--primary); }
        
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #a0aec0; border-radius: 4px; box-sizing: border-box; font-size: 14px; background: #fff; }

        #other_detail_area { display: none; background: #fff9db; padding: 8px; border-radius: 4px; border: 1px solid #f1c40f; margin-top: 5px; animation: fadeIn 0.3s; }

        .photo-area { margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
        #photo-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .preview-img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
        #clear-photos { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; display: none; margin-top: 5px; }

        .analysis-section { background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; margin-bottom: 5px; overflow-x: auto; }
        .analysis-grid { display: flex; gap: 5px; min-width: 600px; }
        .m-box { flex: 1; min-width: 110px; }
        .m-label { font-size: 0.65rem; font-weight: bold; color: var(--accent); margin-bottom: 3px; display: block; }
        .m-sel { height: 100px !important; font-size: 11px; padding: 2px; }

        .section-title { background: #f2f2f2; padding: 4px 8px; font-weight: bold; border: 1px solid #000; border-bottom: none; margin-top: 10px; font-size: 11px; }
        .content-box { border: 1px solid #000; padding: 0; margin-bottom: 5px; }
        .content-box textarea { border: none; min-height: 70px; padding: 8px; resize: none; overflow: hidden; line-height: 1.5; }

        .action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; margin-bottom: 20px; align-items: center; justify-content: center; }
        .btn { flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-save { background: #4a5568; }
        .btn-download { background: #2980b9; }
        .btn-load { background: #718096; }
        .btn-print { background: #2f855a; }
        
        .btn-chat-icon { background: none; border: none; padding: 0; cursor: pointer; width: 55px; height: 55px; flex: 0 0 55px; transition: transform 0.1s; }
        .btn-chat-icon:active { transform: scale(0.9); }
        .btn-chat-icon img { width: 100%; height: 100%; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .footer-copyright { text-align: center; color: #94a3b8; font-size: 11px; padding: 20px 0 10px; letter-spacing: 0.1em; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 印刷時の設定 */
        @media print { 
            /* 印刷したくない要素を指定 */
            .action-bar, 
            .input-only, 
            .type-selector, 
            #photo-input-label, 
            #clear-photos, 
            .footer-copyright { 
                display: none !important; 
            } 
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div class="type-selector input-only">
            <div class="field">
                <label>作成する報告書の種別</label>
                <select id="report_type" onchange="updateType()">
                    <option value="事故">事故報告書</option>
                    <option value="ヒヤリハット">ヒヤリハット報告書</option>
                </select>
            </div>
        </div>

        <h1 id="main_title">事 故 報 告 書</h1>

        <div class="input-grid">
            <div class="field"><label>利用者名</label><input type="text" id="user_name"></div>
            <div class="field">
                <label>要介護度</label>
                <select id="care_level">
                    <option>自立</option><option>要支援1-2</option><option>要介護1</option><option>要介護2</option><option>要介護3</option><option>要介護4</option><option>要介護5</option>
                </select>
            </div>
            <div class="field">
                <label>事故区分</label>
                <select id="category" onchange="updateUI()">
                    <option value="薬">誤薬・誤配薬</option>
                    <option value="転倒">転倒・転落</option>
                    <option value="嚥下">誤嚥・むせ込み</option>
                    <option value="徘徊">離設・徘徊</option>
                    <option value="異食">異食</option>
                    <option value="皮膚">皮膚損傷</option>
                    <option value="破損">器物破損</option>
                    <option value="その他">その他</option>
                </select>
                <div id="other_detail_area">
                    <label>その他詳細内容</label>
                    <input type="text" id="other_detail" placeholder="具体的な区分を入力">
                </div>
            </div>
            <div class="field"><label>報告者</label><input type="text" id="reporter"></div>
            <div class="field"><label>第一発見者</label><input type="text" id="discoverer"></div>
        </div>

        <div class="input-grid">
            <div class="field"><label>発生日時</label><input type="datetime-local" id="event_date"></div>
            <div class="field"><label>報告日時</label><input type="datetime-local" id="report_date"></div>
            <div class="field"><label>発生場所</label><input type="text" id="location" placeholder="例：食堂"></div>
            <div class="field full-width"><label>ケガの状態（部位・程度）</label><input type="text" id="injury"></div>
        </div>

        <div class="section-title">事故発生状況</div>
        <div class="content-box"><textarea id="situation" oninput="autoResize(this)"></textarea></div>

        <div class="section-title">現場写真</div>
        <div class="photo-area content-box">
            <label id="photo-input-label" for="photo-input" class="btn field" style="background:#3498db; display:inline-block; width:auto; padding:5px 10px; font-size:12px;">📷 写真を添付する</label>
            <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
            <button id="clear-photos" onclick="clearPhotos()">すべて削除</button>
            <div id="photo-preview"></div>
        </div>

        <div class="section-title">原因分析（人・物・方法・管理）</div>
        <div class="input-only analysis-section">
            <div class="analysis-grid">
                <div class="m-box"><span class="m-label">人 (利用者)</span><select multiple class="m-sel" id="m-user" onchange="sync()"></select></div>
                <div class="m-box"><span class="m-label">人 (スタッフ)</span><select multiple class="m-sel" id="m-staff" onchange="sync()"></select></div>
                <div class="m-box"><span class="m-label">物 (設備)</span><select multiple class="m-sel" id="m-mac" onchange="sync()"></select></div>
                <div class="m-box"><span class="m-label">方法 (手順)</span><select multiple class="m-sel" id="m-met" onchange="sync()"></select></div>
                <div class="m-box"><span class="m-label">管理 (体制)</span><select multiple class="m-sel" id="m-mng" onchange="sync()"></select></div>
            </div>
        </div>
        <div class="content-box"><textarea id="analysis_text" oninput="autoResize(this)"></textarea></div>

        <div class="section-title">再発予防策</div>
        <div class="content-box"><textarea id="prevent" oninput="autoResize(this)"></textarea></div>

        <div class="action-bar">
            <button class="btn btn-download" onclick="downloadJSONFile()">📁 JSON保存</button>

            <button class="btn-chat-icon" onclick="exportToChatwork()" title="共有用ファイルをDLしてChatworkを起動">
                <img src="https://app.chatwork.com/icon/favicon.ico" alt="Chatwork" onerror="this.src='https://www.chatwork.com/favicon.ico'">
            </button>

            <button class="btn btn-save" onclick="saveData()">一時保存</button>
            <input type="file" id="import-json" accept=".json" style="display:none" onchange="importJSONFile(event)">
            <button class="btn btn-load" onclick="document.getElementById('import-json').click()">ファイル読込</button>
            <button class="btn btn-print" onclick="preparePrint()">印刷 / PDF</button>
        </div>

        <div class="footer-copyright">© 2026 Tacchibanana</div>
    </div>
</div>

<script>
const dataSet = {
    "薬": { user: ["服用拒否","嚥下困難","混乱","体調不良"], staff: ["確認不足","思い込み","焦り","指示誤認"], mac: ["薬袋類似","カート乱れ","カレンダー不備"], met: ["ダブルチェック未実施","本人確認不備"], mng: ["ルールの形骸化","教育不足"], sit: "【状況】配薬時に、薬の残りを確認した。", res: "【対応】主治医報告。副作用観察。" },
    "転倒": { user: ["ふらつき","認知症","尿意","筋力低下"], staff: ["見守り不足","介助ミス"], mac: ["床濡れ","照明不足","靴不適合"], met: ["介助手順不備"], mng: ["人員不足"], sit: "【状況】〇〇にて転倒しているところを発見した。", res: "【対応】バイタル測定。外傷確認。" },
    "嚥下": { user: ["嚥下低下","早食い"], staff: ["介助速度過多"], mac: ["食形態不備"], met: ["姿勢保持不備"], mng: ["評価不足"], sit: "【状況】食事中、激しいむせ込みがあった。", res: "【対応】背部叩打。吸引。" },
    "徘徊": { user: ["見当識障害","帰宅願望"], staff: ["巡回不足"], mac: ["施錠忘れ"], met: ["リスク管理不足"], mng: ["マニュアル未徹底"], sit: "【状況】居室不在。捜索の結果〇〇で発見。", res: "【対応】バイタル・外傷確認。" },
    "その他": { user: [], staff: [], mac: [], met: [], mng: [], sit: "【状況】", res: "【対応】" }
};

let currentPhotoDatas = [];

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
}

function updateType() {
    const type = document.getElementById('report_type').value;
    document.getElementById('main_title').innerText = type === "事故" ? "事 故 報 告 書" : "ヒヤリハット報告書";
}

function updateUI() {
    const cat = document.getElementById('category').value;
    document.getElementById('other_detail_area').style.display = (cat === "その他") ? "block" : "none";
    const item = dataSet[cat] || dataSet["転倒"];
    updateSelect("m-user", item.user);
    updateSelect("m-staff", item.staff);
    updateSelect("m-mac", item.mac);
    updateSelect("m-met", item.met);
    updateSelect("m-mng", item.mng);
    sync();
}

function updateSelect(id, list) {
    const sel = document.getElementById(id); sel.innerHTML = "";
    (list || []).forEach(v => { const opt = document.createElement("option"); opt.value = v; opt.text = v; sel.appendChild(opt); });
}

function sync() {
    let res = ""; const labels = ["【利用者】", "【スタッフ】", "【物】", "【方法】", "【管理】"];
    document.querySelectorAll(".m-sel").forEach((s, i) => {
        const vals = Array.from(s.selectedOptions).map(o => o.value);
        if (vals.length > 0) res += labels[i] + vals.join('、') + " ";
    });
    const tx = document.getElementById('analysis_text');
    tx.value = res;
    autoResize(tx);
}

function handlePhotos(event) {
    const files = event.target.files;
    if (files.length > 0) document.getElementById('clear-photos').style.display = 'inline-block';
    for (let i = 0; i < files.length; i++) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.createElement('img');
            img.src = e.target.result; img.className = 'preview-img';
            document.getElementById('photo-preview').appendChild(img);
            currentPhotoDatas.push(e.target.result);
        };
        reader.readAsDataURL(files[i]);
    }
}

function clearPhotos() {
    document.getElementById('photo-preview').innerHTML = '';
    currentPhotoDatas = [];
    document.getElementById('clear-photos').style.display = 'none';
}

function preparePrint() {
    document.querySelectorAll('textarea').forEach(autoResize);
    window.print();
}

function collectData() {
    const storage = {};
    document.querySelectorAll('input, select, textarea').forEach(el => { 
        if(el.id) storage[el.id] = el.type==='checkbox'?el.checked:el.value; 
    });
    storage['attached_photos'] = currentPhotoDatas;
    return storage;
}

function downloadJSONFile() {
    const storage = collectData();
    const userName = storage.user_name || "未入力";
    const reportType = document.getElementById('report_type').value;
    const now = new Date();
    const fileName = `【共有】${reportType}_${userName}_${now.getTime()}.json`;
    
    const blob = new Blob([JSON.stringify(storage, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    alert("ダウンロード完了。");
}

function exportToChatwork() {
    const storage = collectData();
    const userName = storage.user_name || "未入力";
    const reportType = document.getElementById('report_type').value;
    downloadJSONFile();
    const text = `📌 【${reportType}】共有データ：${userName} 様\n添付のJSONファイルを読み込んで確認してください。\n\n【状況】\n${storage.situation || ""}`;
    navigator.clipboard.writeText(text).then(() => {
        window.location.assign("chatwork://");
        setTimeout(() => { if(confirm("アプリが開きませんか？Web版を開きます。")) window.open("https://www.chatwork.com/", "_blank"); }, 1500);
    });
}

function importJSONFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (el.type === 'checkbox') el.checked = data[id];
                    else el.value = data[id];
                }
            });
            clearPhotos();
            if (data.attached_photos) {
                currentPhotoDatas = data.attached_photos;
                document.getElementById('clear-photos').style.display = 'inline-block';
                currentPhotoDatas.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src; img.className = 'preview-img';
                    document.getElementById('photo-preview').appendChild(img);
                });
            }
            updateType();
            document.querySelectorAll('textarea').forEach(autoResize);
            alert("読み込み完了");
        } catch (err) { alert("不正なファイル形式です。"); }
    };
    reader.readAsText(file);
}

function saveData() {
    localStorage.setItem('incident_temp', JSON.stringify(collectData()));
    alert('ブラウザに一時保存しました。');
}

updateUI();
</script>
</body>
</html>
