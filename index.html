<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カンタン事故報告アプリ（プロ版）</title>
    <style>
        :root { --primary: #007bff; --admin: #5a6268; --bg: #f0f2f5; --warning: #fff3cd; --accent: #e84118; }
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: var(--bg); padding: 10px; color: #333; line-height: 1.4; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #ddd; }
        .staff-card { border-top: 6px solid var(--primary); }
        .admin-card { border-top: 6px solid var(--admin); background: #fafafa; }
        h1 { font-size: 1.2rem; text-align: center; color: var(--primary); margin: 10px 0; font-weight: bold; }
        h2 { font-size: 0.95rem; border-left: 4px solid var(--primary); padding-left: 8px; margin: 15px 0 8px; }
        .label-guide { font-size: 0.75rem; color: #666; margin-bottom: 3px; display: block; font-weight: bold; }
        input, textarea, select { width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 0.95rem; box-sizing: border-box; margin-bottom: 8px; }
        
        /* チップグリッド（スマホ2列、PC3列） */
        .chip-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .chip { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; background: #fff; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }
        
        #fall-details { display: none; background: #fff5f5; border: 1px solid #fab1a0; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .yochou-alert { display: none; background: var(--warning); border: 1px solid #ffeeba; padding: 10px; border-radius: 8px; margin-bottom: 12px; color: #856404; font-size: 0.85rem; }
        .m-box { margin-bottom: 10px; padding: 8px; background: #fff; border-radius: 6px; border: 1px solid #eee; }
        .btn-report { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-file { background: #fff; border: 1px solid #ccc; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        #result { display: none; background: #fff; padding: 15px; border-radius: 10px; white-space: pre-wrap; margin-top: 20px; border: 2px solid var(--primary); font-size: 0.9rem; }
    </style>
</head>
<body>

<h1>事故報告アプリ</h1>

<div style="display:flex; gap:8px; justify-content:center; margin-bottom:10px;">
    <button class="btn-file" onclick="document.getElementById('fileIn').click()">📁 読込</button>
    <input type="file" id="fileIn" style="display:none" onchange="loadFile(event)">
    <button class="btn-file" style="background:#28a745; color:white; border:none;" onclick="saveToFile()">💾 保存</button>
</div>

<div class="card staff-card">
    <p style="text-align:center; font-weight:bold; color:var(--primary); margin:0 0 10px;">1. 報告内容（事実確認）</p>
    
    <div class="input-grid">
        <label class="label-guide">利用者名</label>
        <input type="text" id="user-name" placeholder="氏名を入力">
        <label class="label-guide">報告者</label>
        <input type="text" id="reporter-name" placeholder="職員名を入力">
    </div>

    <h2>発生情報</h2>
    <input type="datetime-local" id="occ-time">
    <input type="text" id="occ-place" placeholder="場所（例：食堂、個室など）">

    <h2>事故区分（タップで選択）</h2>
    <div class="chip-grid">
        <div class="chip" onclick="selectCategory(this, 'fall')">転倒・転落</div>
        <div class="chip" onclick="selectCategory(this, 'med')">誤薬・誤配薬</div>
        <div class="chip" onclick="selectCategory(this, 'eat')">誤嚥・むせ</div>
        <div class="chip" onclick="selectCategory(this, 'skin')">表皮剥離・キズ</div>
        <div class="chip" onclick="selectCategory(this, 'move')">離設・徘徊</div>
        <div class="chip" onclick="selectCategory(this, 'other')">その他</div>
    </div>

    <div id="fall-details">
        <p style="color:var(--accent); font-weight:bold; font-size:0.85rem; margin:0 0 8px;">▼ 転倒詳細項目</p>
        <select id="fall-shoes"><option value="">履物：未選択</option><option value="リハビリ靴">リハビリ靴</option><option value="スリッパ">スリッパ</option><option value="裸足/靴下">裸足/靴下</option></select>
        <select id="fall-risk"><option value="">評価：未選択</option><option value="想定内">リスク把握済み</option><option value="想定外">リスクなしと判断</option></select>
    </div>

    <h2>状況の詳細（自動入力可）</h2>
    <textarea id="occ-detail" rows="4" placeholder="発見時の様子を入力"></textarea>

    <h2>利用者要因</h2>
    <label style="display:flex; align-items:center; margin-bottom:8px;">
        <input type="checkbox" id="check-p-yochou" onchange="toggleYochou()" style="width:20px; height:20px; margin-right:10px;">
        <span>利用者側に要因（体調変化等）がある</span>
    </label>
    <div id="yochou-msg" class="yochou-alert">💡 <strong>予兆キャッチャー</strong>で状態評価を推奨します。</div>
    <textarea id="staff-p-view" rows="2" placeholder="ご本人の様子（ふらつき、不穏など）"></textarea>

    <h2>現場が考える直接原因</h2>
    <textarea id="staff-cause" rows="2"></textarea>
</div>

<div class="card admin-card">
    <p style="text-align:center; font-weight:bold; color:var(--admin); margin:0 0 10px;">2. 管理者分析（4M）</p>
    <div class="m-box"><span class="label-guide">Man（人：スタッフ・連携）</span><textarea id="m-man" rows="2"></textarea></div>
    <div class="m-box"><span class="label-guide">Machine（物：環境・用具）</span><textarea id="m-mach" rows="2"></textarea></div>
    <div class="m-box"><span class="label-guide">Method（方法：手順・周知）</span><textarea id="m-meth" rows="2"></textarea></div>
    <div class="m-box"><span class="label-guide">Management（管理：教育・体制）</span><textarea id="m-mgmt" rows="2"></textarea></div>
    
    <h2>再発防止策</h2>
    <textarea id="admin-plan" rows="3" placeholder="具体的な対策を記入"></textarea>
</div>

<button class="btn-report" onclick="generateReport()">報告書を生成</button>
<div id="result"></div>

<script>
// 区分ごとのテンプレートデータ
const templates = {
    'fall': {
        detail: "【発見】訪室時、ベッド横の床に座り込んでいるのを発見。「トイレに行こうとした」と話される。左膝に発赤あり。",
        cause: "下肢筋力の低下、および夜間の頻尿による焦り。センサーマットの反応前に動き出された。",
        m: { man: "見守り頻度の不足。夜間巡回時間の偏り。", mach: "離床センサーの設置位置が足元に届いていなかった。", meth: "トイレ誘導のタイミング（排泄プラン）の見直し不足。", mgmt: "夜間1名体制による対応の遅れ。" }
    },
    'med': {
        detail: "【発見】朝食後の配薬時、本来A様の薬をB様に誤って配薬。内服後にスタッフが残薬を確認して発覚。",
        cause: "配薬時のネームカード確認漏れ。他職員からの呼びかけによる注意力の散漫。",
        m: { man: "確認手順の省略。ダブルチェックの形骸化。", mach: "薬袋の氏名印字が小さく、視認性が低かった。", meth: "配薬中の「話しかけ禁止」ルールの未徹底。", mgmt: "新人職員への配薬教育の不足。" }
    },
    'eat': {
        detail: "【発見】昼食摂取中、突然激しくむせ込み、顔色が不良（チアノーゼ様）となる。",
        cause: "一口量が多く、十分に咀嚼しないまま嚥下された。食事形態（刻み食）の不適合。",
        m: { man: "食事介助時のペース配分ミス。見守り不足。", mach: "椅子の高さが合わず、前傾姿勢が取れていなかった。", meth: "嚥下状態の再アセスメントが遅れていた。", mgmt: "多職種（ST等）との連携不足。" }
    }
};

function selectCategory(el, type) {
    // チップの切り替え
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    
    // 転倒詳細の表示切り替え
    document.getElementById('fall-details').style.display = (type === 'fall') ? 'block' : 'none';
    
    // テンプレートの自動入力
    const temp = templates[type];
    if (temp) {
        document.getElementById('occ-detail').value = temp.detail;
        document.getElementById('staff-cause').value = temp.cause;
        document.getElementById('m-man').value = temp.m.man;
        document.getElementById('m-mach').value = temp.m.mach;
        document.getElementById('m-meth').value = temp.m.meth;
        document.getElementById('m-mgmt').value = temp.m.mgmt;
    }
}

function toggleYochou() {
    document.getElementById('yochou-msg').style.display = document.getElementById('check-p-yochou').checked ? 'block' : 'none';
}

function generateReport() {
    const name = document.getElementById('user-name').value;
    const reporter = document.getElementById('reporter-name').value;
    const cat = document.querySelector('.chip.active')?.innerText || "未設定";
    const time = document.getElementById('occ-time').value.replace('T', ' ');
    
    let res = `【事故報告書】\n■対象者：${name}様\n■報告者：${reporter}\n■日時：${time}\n■区分：${cat}\n`;
    res += `\n[状況]\n${document.getElementById('occ-detail').value}\n`;
    res += `\n[4M分析結果]\n・Man：${document.getElementById('m-man').value}\n・Machine：${document.getElementById('m-mach').value}\n・Method：${document.getElementById('m-meth').value}\n・Management：${document.getElementById('m-mgmt').value}\n`;
    res += `\n[再発防止策]\n${document.getElementById('admin-plan').value}`;
    
    const r = document.getElementById('result');
    r.innerText = res; r.style.display = 'block'; r.scrollIntoView({behavior: 'smooth'});
}

function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

// 保存・読込ロジック（簡易版）
function saveToFile() {
    const data = { name: document.getElementById('user-name').value, detail: document.getElementById('occ-detail').value };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `report_${new Date().getTime()}.json`;
    a.click();
}
</script>
</body>
</html>
